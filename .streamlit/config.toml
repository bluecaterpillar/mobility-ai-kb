[theme]
# The Hurry brand palette (https://www.the-hurry.com)
primaryColor = "#710B41"            # Hurry maroon
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5EFF2"  # very light pink — soft brand surface
textColor = "#1A1A1A"
font = "sans serif"

[server]
headless = true
runOnSave = true
maxUploadSize = 50

[browser]
gatherUsageStats = false
